<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Glucosa">
<link rel="apple-touch-icon" href="icon.png">
<title>Conversor de Glucosa</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #0F2B2E 0%, #163C3F 100%);
    color: #EAF4F2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
  }

  .card {
    background: #FFFFFF;
    border-radius: 18px;
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.25);
    padding: 36px 32px;
    width: 100%;
    max-width: 420px;
    border: 1px solid #1B4A4E;
    color: #1B3A3C;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
    color: #14474A;
  }

  .subtitle {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 0.85rem;
    color: #4D8A8C;
    margin-bottom: 28px;
    font-weight: 600;
  }

  .field {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #4D8A8C;
    margin-bottom: 6px;
    font-weight: 700;
  }

  .input-row {
    display: flex;
    align-items: center;
    border: 1.5px solid #CFE6E4;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s ease;
  }

  .input-row:focus-within {
    border-color: #E8775A;
  }

  input[type="number"] {
    flex: 1;
    border: none;
    outline: none;
    padding: 14px 14px;
    font-size: 1.4rem;
    font-family: 'Georgia', serif;
    color: #14474A;
    background: transparent;
    width: 100%;
    min-width: 0;
  }

  .unit {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: #E8775A;
    padding: 0 14px;
    white-space: nowrap;
    background: #F3FAF9;
    height: 100%;
    display: flex;
    align-items: center;
    border-left: 1px solid #CFE6E4;
  }

  .swap {
    display: flex;
    justify-content: center;
    margin: 4px 0 18px;
  }

  .swap button {
    background: #F3FAF9;
    border: 1px solid #CFE6E4;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    cursor: pointer;
    font-size: 1.1rem;
    color: #E8775A;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, background 0.15s ease;
  }

  .swap button:hover {
    background: #E8F2F1;
  }

  .swap button.spin {
    transform: rotate(180deg);
  }

  .note {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 0.78rem;
    color: #6FA3A4;
    margin-top: 22px;
    line-height: 1.5;
    border-top: 1px solid #E1F0EE;
    padding-top: 16px;
  }

  .note strong {
    color: #14474A;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Conversor de glucosa</h1>
  <div class="subtitle">mg/dL ⇄ mmol/L</div>

  <div class="field">
    <label for="mgdl">mg/dL</label>
    <div class="input-row">
      <input type="number" id="mgdl" placeholder="0" inputmode="decimal">
      <span class="unit">mg/dL</span>
    </div>
  </div>

  <div class="swap">
    <button id="swapBtn" title="Convertir" aria-label="Convertir">⇄</button>
  </div>

  <div class="field">
    <label for="mmol">mmol/L</label>
    <div class="input-row">
      <input type="number" id="mmol" placeholder="0" inputmode="decimal">
      <span class="unit">mmol/L</span>
    </div>
  </div>

  <div class="note">
    <strong>Fórmula:</strong> mg/dL ÷ 18.0182 = mmol/L &nbsp;·&nbsp; mmol/L × 18.0182 = mg/dL.
    Escribe en cualquiera de los dos campos para ver el equivalente al instante.
  </div>
</div>

<script>
  const mgdl = document.getElementById('mgdl');
  const mmol = document.getElementById('mmol');
  const FACTOR = 18.0182;

  function round(n) {
    return Math.round(n * 100) / 100;
  }

  mgdl.addEventListener('input', () => {
    if (mgdl.value === '') {
      mmol.value = '';
      return;
    }
    const val = parseFloat(mgdl.value);
    if (!isNaN(val)) {
      mmol.value = round(val / FACTOR);
    }
  });

  mmol.addEventListener('input', () => {
    if (mmol.value === '') {
      mgdl.value = '';
      return;
    }
    const val = parseFloat(mmol.value);
    if (!isNaN(val)) {
      mgdl.value = round(val * FACTOR);
    }
  });

  document.getElementById('swapBtn').addEventListener('click', (e) => {
    e.currentTarget.classList.toggle('spin');
    mgdl.focus();
  });
</script>

</body>
</html>
